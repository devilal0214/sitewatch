# HTTP server — redirects to HTTPS (or serves directly if SSL not configured)
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect non-ACME traffic to HTTPS if SSL certs exist
    # Comment out this block and uncomment the proxy blocks below for HTTP-only setups
    location / {
        return 301 https://$host$request_uri;
    }
}

