version: '3.8'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sitewatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sitewatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-sitewatch}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sitewatch}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sitewatch_net

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sitewatch_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-changeme}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sitewatch_net

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sitewatch_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-sitewatch}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-sitewatch}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      PORT: 3001
      # SMTP
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # Agency branding
      AGENCY_NAME: ${AGENCY_NAME:-JV Digital}
      AGENCY_WEBSITE: ${AGENCY_WEBSITE}
      # App URL
      APP_URL: ${APP_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - reports_data:/app/reports
      - logs_data:/app/logs
    networks:
      - sitewatch_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sitewatch_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${APP_URL:-http://localhost}
    depends_on:
      - backend
    networks:
      - sitewatch_net
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Nginx ───────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sitewatch_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_data:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
      - logs_nginx:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - sitewatch_net

  # ── Certbot (optional, for Let's Encrypt) ───────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: sitewatch_certbot
    volumes:
      - certbot_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"
    profiles:
      - ssl

volumes:
  postgres_data:
  redis_data:
  reports_data:
  logs_data:
  logs_nginx:
  certbot_data:
  certbot_webroot:

networks:
  sitewatch_net:
    driver: bridge
